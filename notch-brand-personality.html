:root {
  --red: #c9414f;
  --orange: #f47842;
  --gold: #f4b761;
  --cream: #f8f1eb;
  --pink: #f8e7e9;
  --white: #fffcfa;
  --dark: #2a1515;
  --muted: #a07880;
  --border: #e8d0d3;

  /* Archetype colours */
  --creator: #f47842;
  --caregiver: #e8a0b0;
  --hero: #c9414f;
  --sage: #6b8cae;
  --jester: #f4b761;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--pink);
  padding: 44px 24px 64px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -32px; left: 0; right: 0;
  height: 65px;
  background: var(--cream);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}
.header-tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
}
.header h1 {
  font-family: 'Wild Mango', cursive;
  font-size: clamp(32px, 8vw, 56px);
  color: var(--red);
  line-height: 1.05; margin-bottom: 14px;
  position: relative; z-index: 1;
}
.header h1 em {
  color: var(--orange);
  font-style: normal;
}
.header p {
  font-size: 13px; color: var(--muted);
  max-width: 420px; margin: 0 auto;
  line-height: 1.7; position: relative; z-index: 1;
}

.wrapper { max-width: 620px; margin: 0 auto; padding: 0 20px 80px; }

/* PROGRESS */
.progress-wrap { margin: 32px 0 28px; }
.progress-top {
  display: flex; justify-content: space-between;
  font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px;
}
.progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--gold));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* QUESTION CARD */
.question-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 28px 24px;
  box-shadow: 0 4px 28px rgba(42,21,21,0.07);
  display: none;
}
.question-card.active { display: block; animation: fadeUp 0.35s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-num {
  display: inline-block;
  background: var(--dark); color: white;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 16px;
}
.q-text {
  font-family: 'Wild Mango', cursive;
  font-size: 20px; color: var(--dark);
  line-height: 1.35; margin-bottom: 6px;
}
.q-sub {
  font-size: 12px; color: var(--muted);
  margin-bottom: 22px; line-height: 1.6;
}

.options { display: flex; flex-direction: column; gap: 9px; }
.option {
  background: var(--pink);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 12px;
  transition: all 0.18s;
  user-select: none;
}
.option:hover { border-color: var(--red); background: #fdf0f1; }
.option.selected { border-color: var(--red); background: #fdf0f1; }
.option.selected .opt-circle { background: var(--red); border-color: var(--red); }
.option.selected .opt-circle::after { opacity: 1; }

.opt-circle {
  width: 18px; height: 18px; flex-shrink: 0;
  border: 2px solid var(--border); border-radius: 50%;
  background: white; position: relative; margin-top: 2px;
  transition: all 0.18s;
}
.opt-circle::after {
  content: ''; position: absolute;
  top: 3px; left: 3px;
  width: 8px; height: 8px;
  border-radius: 50%; background: white;
  opacity: 0; transition: opacity 0.15s;
}
.opt-label { font-size: 13px; font-weight: 600; color: var(--dark); }
.opt-desc { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

/* NAV */
.nav {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 20px;
}
.btn-back {
  background: none; border: 1.5px solid var(--border);
  color: var(--muted); font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 10px 18px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.btn-back:hover { border-color: var(--red); color: var(--red); }
.btn-back:disabled { opacity: 0.3; cursor: default; }
.btn-next {
  background: var(--red); color: white;
  border: none; font-family: 'Montserrat', sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 12px 24px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  opacity: 0.4; pointer-events: none;
}
.btn-next.ready { opacity: 1; pointer-events: all; }
.btn-next.ready:hover { background: #b52f3e; transform: translateY(-1px); }

/* RESULT */
.result { display: none; }
.result.show { display: block; animation: fadeUp 0.4s ease; }

.result-hero {
  border-radius: 18px;
  padding: 36px 28px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.result-hero::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0.12;
  background: radial-gradient(circle at 30% 50%, white, transparent 60%);
}
.archetype-icon {
  font-size: 48px; margin-bottom: 12px;
  display: block; position: relative; z-index: 1;
}
.result-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.6); margin-bottom: 8px;
  position: relative; z-index: 1;
}
.result-archetype {
  font-family: 'Wild Mango', cursive;
  font-size: clamp(34px, 8vw, 52px);
  color: white; line-height: 1.0;
  margin-bottom: 10px;
  position: relative; z-index: 1;
}
.result-tagline {
  font-size: 14px; color: rgba(255,255,255,0.8);
  font-style: italic; line-height: 1.6;
  max-width: 380px; margin: 0 auto 18px;
  position: relative; z-index: 1;
}
.result-brands {
  display: inline-flex; gap: 8px; flex-wrap: wrap;
  justify-content: center; position: relative; z-index: 1;
}
.brand-pill {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: white; font-size: 10px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  letter-spacing: 0.05em;
}

/* DESCRIPTION CARD */
.desc-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 22px; margin-bottom: 14px;
}
.desc-card p {
  font-size: 13px; color: var(--dark);
  line-height: 1.75;
}
.desc-card strong { color: var(--red); }

/* TRAITS */
.traits-wrap { margin-bottom: 14px; }
.traits-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.traits {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.trait {
  background: var(--pink);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 11px; font-weight: 700; color: var(--dark);
}

/* DEEPER INSIGHT */
.insight-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 22px; margin-bottom: 14px;
}
.insight-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}
.insight-row {
  display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start;
}
.insight-icon {
  font-size: 16px; flex-shrink: 0; margin-top: 1px;
}
.insight-text { font-size: 12px; color: var(--dark); line-height: 1.65; }
.insight-text strong { color: var(--red); }

/* MORE BRANDS */
.more-brands-card {
  background: var(--pink);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px; margin-bottom: 14px;
}
.more-brands-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}
.more-brands-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.brand-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
}
.brand-card-name {
  font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 2px;
}
.brand-card-why {
  font-size: 10.5px; color: var(--muted); line-height: 1.5;
}

/* SHARE PROMPT */
.share-box {
  background: var(--pink);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px; margin-bottom: 14px;
  text-align: center;
}
.share-box p {
  font-size: 12px; color: var(--muted);
  margin-bottom: 4px;
}
.share-box strong {
  font-size: 14px; color: var(--dark);
  display: block; margin-bottom: 10px;
}
.share-hint {
  font-size: 11px; color: var(--muted); font-style: italic;
}

/* CTA */
.cta-band {
  background: var(--dark);
  border-radius: 14px;
  padding: 22px 20px;
  display: flex; align-items: center;
  justify-content: space-between;
  flex-wrap: wrap; gap: 14px;
  margin-bottom: 14px;
}
.cta-text strong { color: white; font-size: 14px; display: block; margin-bottom: 3px; }
.cta-text span { font-size: 12px; color: rgba(255,255,255,0.5); }
.cta-btn {
  background: var(--gold); color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 12px 22px; border: none; border-radius: 8px;
  cursor: pointer; text-decoration: none;
  display: inline-block; flex-shrink: 0;
  transition: transform 0.15s, opacity 0.15s;
}
.cta-btn:hover { transform: scale(1.03); opacity: 0.9; }

.retry-btn {
  width: 100%; background: none;
  border: 1.5px solid var(--border);
  color: var(--muted); font-family: 'Montserrat', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.retry-btn:hover { border-color: var(--red); color: var(--red); }

.footer {
  text-align: center; margin-top: 40px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.footer a { color: var(--red); text-decoration: none; }

  /* EMAIL CAPTURE */
  .email-capture {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 14px;
    text-align: center;
  }
  .email-capture-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .email-capture-title {
    font-family: 'Wild Mango', cursive;
    font-size: 20px; color: var(--dark);
    margin-bottom: 6px;
  }
  .email-capture-sub {
    font-size: 12px; color: var(--muted);
    margin-bottom: 16px; line-height: 1.6;
  }
  .email-capture-row {
    display: flex; gap: 8px; max-width: 420px; margin: 0 auto;
  }
  .email-capture-input {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; color: var(--dark);
    outline: none; transition: border-color 0.2s;
  }
  .email-capture-input:focus { border-color: var(--red); }
  .email-capture-btn {
    background: var(--red); color: white;
    border: none; border-radius: 8px;
    padding: 11px 18px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s; flex-shrink: 0;
  }
  .email-capture-btn:hover { background: #b52f3e; }
  .email-capture-skip {
    font-size: 10px; color: var(--muted);
    margin-top: 10px; display: block;
    cursor: pointer; text-decoration: underline;
    text-decoration-color: var(--border);
  }
  .email-capture-skip:hover { color: var(--red); }
  .email-capture-success {
    font-size: 12px; font-weight: 700;

let current = 0;
let answers = new Array(questions.length).fill(null);
let scores = { creator: 0, caregiver: 0, hero: 0, sage: 0, jester: 0, innocent: 0, ruler: 0, magician: 0 };

function buildQuestions() {
  const container = document.getElementById('questions');
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (qi === 0 ? ' active' : '');
    card.id = `q${qi}`;
    card.innerHTML = `
      <div class="q-num">Question ${qi + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.sub ? `<div class="q-sub">${q.sub}</div>` : ''}
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <div class="opt-circle"></div>
            <div class="opt-body">
              <div class="opt-label">${opt.label}</div>
              ${opt.desc ? `<div class="opt-desc">${opt.desc}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  questions[qi].options.forEach((_, i) => {
    document.getElementById(`opt-${qi}-${i}`)?.classList.remove('selected');
  });
  document.getElementById(`opt-${qi}-${oi}`)?.classList.add('selected');
  answers[qi] = oi;
  document.getElementById('btnNext').classList.add('ready');
}

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('btnBack').disabled = current === 0;
}

function goNext() {
  if (answers[current] === null) return;
  const scoreObj = questions[current].options[answers[current]].scores;
  Object.entries(scoreObj).forEach(([k, v]) => { if (scores[k] !== undefined) scores[k] += v; });

  if (current < questions.length - 1) {
    document.getElementById(`q${current}`).classList.remove('active');
    current++;
    document.getElementById(`q${current}`).classList.add('active');
    document.getElementById('btnNext').classList.remove('ready');
    if (answers[current] !== null) document.getElementById('btnNext').classList.add('ready');
    updateProgress();
    if (current === questions.length - 1) document.getElementById('btnNext').textContent = 'See My Personality →';
  } else {
    showResult();
  }
}

function goBack() {
  if (current === 0) return;
  const scoreObj = questions[current].options[answers[current]]?.scores || {};
  Object.entries(scoreObj).forEach(([k, v]) => { if (scores[k] !== undefined) scores[k] -= v; });
  document.getElementById(`q${current}`).classList.remove('active');
  current--;
  document.getElementById(`q${current}`).classList.add('active');
  document.getElementById('btnNext').textContent = current === questions.length - 1 ? 'See My Personality →' : 'Next →';
  if (answers[current] !== null) document.getElementById('btnNext').classList.add('ready');
  else document.getElementById('btnNext').classList.remove('ready');
  updateProgress();
}

  document.getElementById('questions').style.display = 'none';
  document.getElementById('nav').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Done!';
  document.getElementById('progressPct').textContent = '100%';

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = `
    <div class="result-hero" style="background: ${arch.bg};">
      <span class="archetype-icon">${arch.icon}</span>
      <div class="result-label">Your brand archetype</div>
      <div class="result-archetype">${arch.name}</div>
      <div class="result-tagline">${arch.tagline}</div>

        ${arch.brands.map(b => `<span class="brand-pill">${b}</span>`).join('')}

    <div class="desc-card">
      <p>${arch.desc}</p>

    <div class="traits-wrap">
      <div class="traits-label">Your brand traits</div>
      <div class="traits">
        ${arch.traits.map(t => `<span class="trait">${t}</span>`).join('')}
      </div>
    </div>

    <div class="insight-card">
      <div class="insight-label">What this means for your brand</div>
      ${arch.insights.map(i => `
        <div class="insight-row">
          <span class="insight-icon">${i.icon}</span>
          <div class="insight-text">${i.text}</div>
        </div>`).join('')}
    </div>

    <div class="more-brands-card">
      <div class="more-brands-label">Brands that share your archetype</div>
      <div class="more-brands-grid">
        ${arch.moreBrands.map(b => `
          <div class="brand-card">
            <div class="brand-card-name">${b.name}</div>
            <div class="brand-card-why">${b.why}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="email-capture" id="emailCapture">
      <span class="email-capture-icon">📬</span>
      <div class="email-capture-title">Want your results in your inbox?</div>
      <div class="email-capture-sub">Pop your email in and we'll send your brand archetype straight to you. No spam, just your results.</div>
      <div class="email-capture-row">
        <input type="email" class="email-capture-input" id="captureEmail" placeholder="your@email.com">
        <button class="email-capture-btn" onclick="sendResults('${arch.name}', '${arch.tagline}', '${arch.traits.join(', ')}', '${arch.brands.join(', ')}')">Send me my results</button>
      </div>
      <span class="email-capture-skip" onclick="document.getElementById('emailCapture').style.display='none'">No thanks, I'll just view on screen</span>
      <div class="email-capture-success" id="captureSuccess">✅ On its way! Check your inbox shortly.</div>
    </div>
    <div class="share-box">
      <p>Found out you're a ${arch.name}?</p>
      <strong>Share your result on your stories! ✦</strong>
      <span class="share-hint">Tag @notchmedia_ and we might just feature you</span>
    </div>

    <div class="cta-band">
      <div class="cta-text">
        <strong>Ready to build your ${arch.name.replace('The ', '')} brand?</strong>
        <span style="color: var(--pink);">Let's make it something you're proud of.</span>
      </div>
      <a class="cta-btn" href="https://www.notchmedia.co.uk/contact" target="_blank">Let's Chat →</a>
    </div>

    <button class="retry-btn" onclick="restartQuiz()">↺ Try Again</button>
  `;
  resultEl.classList.add('show');
}

function restartQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  scores = { creator: 0, caregiver: 0, hero: 0, sage: 0, jester: 0, innocent: 0, ruler: 0, magician: 0 };
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  document.getElementById('questions').style.display = 'block';
  document.getElementById('nav').style.display = 'flex';
  document.querySelectorAll('.question-card').forEach((c, i) => c.classList.toggle('active', i === 0));
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.getElementById('btnNext').classList.remove('ready');
  document.getElementById('btnNext').textContent = 'Next →';
  document.getElementById('btnBack').disabled = true;
  updateProgress();
}

buildQuestions();
updateProgress();





function sendResults(archetype, tagline, traits, brands) {
  var email = document.getElementById('captureEmail').value;
  if (!email || email.indexOf('@') === -1) {
    document.getElementById('captureEmail').style.borderColor = 'var(--red)';
    return;
  }
  var submitBtn = document.querySelector('.email-capture-btn');
  if (submitBtn) submitBtn.textContent = 'Sending...';

  var params = {
    from_email: email,
    archetype: archetype,
    tagline: tagline,
    traits: traits,
    brands: brands
  };

  // Send to Anja
  emailjs.send('service_x5llg8l', 'template_0l7tvjh', params)
    .then(function() {
      // Send to the person
      return emailjs.send('service_x5llg8l', 'template_uhei5xs', params);
    })
    .then(function() {
      document.getElementById('captureSuccess').classList.add('show');
      document.getElementById('captureEmail').style.display = 'none';
      if (submitBtn) submitBtn.style.display = 'none';
      var skip = document.querySelector('.email-capture-skip');
      if (skip) skip.style.display = 'none';
    })
    .catch(function() {
      if (submitBtn) submitBtn.textContent = 'Send me my results';
      var successEl = document.getElementById('captureSuccess');
      if (successEl) {
        successEl.style.color = 'var(--red)';
        successEl.textContent = 'Something went wrong, please try again.';
        successEl.classList.add('show');
      }
    });
}

</script>
